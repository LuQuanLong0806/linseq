<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A101F"/>
      <stop offset="100%" stop-color="#0D1B2A"/>
    </linearGradient>
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9D5CFF"/>
      <stop offset="40%" stop-color="#B57CFF"/>
      <stop offset="100%" stop-color="#7B2FFF"/>
    </linearGradient>
    <linearGradient id="boltEdge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C9A5FF"/>
      <stop offset="100%" stop-color="#9D5CFF"/>
    </linearGradient>
    <radialGradient id="glowBg" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#9D5CFF" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#9D5CFF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#9D5CFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 深色圆角背景 -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- 背景光晕 -->
  <circle cx="256" cy="230" r="220" fill="url(#glowBg)"/>

  <!-- 外圈装饰环 -->
  <circle cx="256" cy="240" r="180" fill="none" stroke="#9D5CFF" stroke-width="1" opacity="0.12"/>
  <circle cx="256" cy="240" r="160" fill="none" stroke="#9D5CFF" stroke-width="0.5" opacity="0.08" stroke-dasharray="8 12"/>

  <!-- 闪电主体 -->
  <polygon points="280,40 160,240 248,240 220,472 370,220 272,220"
    fill="url(#boltGrad)" stroke="url(#boltEdge)" stroke-width="3"
    stroke-linejoin="round" filter="url(#bigGlow)"/>

  <!-- 闪电高光 -->
  <polygon points="275,55 180,235 250,235 235,420 345,235 270,235"
    fill="rgba(255,255,255,0.08)" stroke="none"/>

  <!-- 闪电核心亮线 -->
  <line x1="272" y1="60" x2="195" y2="230" stroke="#D4B5FF" stroke-width="2" opacity="0.4" filter="url(#softGlow)"/>
  <line x1="250" y1="245" x2="232" y2="440" stroke="#D4B5FF" stroke-width="1.5" opacity="0.25" filter="url(#softGlow)"/>

  <!-- 底部文字 "LS" -->
  <text x="256" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-weight="800" font-size="42"
    fill="#9D5CFF" opacity="0.5" letter-spacing="12">LS</text>

  <!-- 四角小光点 -->
  <circle cx="96" cy="96" r="3" fill="#00E5FF" opacity="0.3" filter="url(#softGlow)"/>
  <circle cx="416" cy="96" r="3" fill="#9D5CFF" opacity="0.3" filter="url(#softGlow)"/>
  <circle cx="96" cy="416" r="3" fill="#9D5CFF" opacity="0.2" filter="url(#softGlow)"/>
  <circle cx="416" cy="416" r="3" fill="#00E5FF" opacity="0.2" filter="url(#softGlow)"/>
</svg>
